services:
  postgres:
    image: postgres:16-alpine
    container_name: social_fit_db
    environment:
      POSTGRES_USER: social_fit
      POSTGRES_PASSWORD: social_fit
      POSTGRES_DB: social_fit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
